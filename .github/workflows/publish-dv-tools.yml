name: Publish dv-tools

on:
  push:
    tags:
      - 'dv-tools/v*'   # e.g. dv-tools/v1.2.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.0) — leave blank to use package.json'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@powerbipro-eu'

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/dv-tools/v')
        working-directory: packages/dv-tools
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/dv-tools/v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${TAG_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing version ${TAG_VERSION}"

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        working-directory: packages/dv-tools
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ github.event.inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing version ${{ github.event.inputs.version }}"

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Build
        working-directory: packages/dv-tools
        run: npm run build

      - name: Publish to GitHub Packages
        working-directory: packages/dv-tools
        run: npm publish --access public --legacy-peer-deps
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
